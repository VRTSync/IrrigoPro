<!DOCTYPE html>
<html>
<head>
    <title>QuickBooks Connection Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .info { background: #f0f8ff; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffe6e6; padding: 15px; margin: 10px 0; border-radius: 5px; color: red; }
        .success { background: #e6ffe6; padding: 15px; margin: 10px 0; border-radius: 5px; color: green; }
        button { padding: 10px 20px; margin: 5px; background: #007cba; color: white; border: none; border-radius: 5px; cursor: pointer; }
        code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>QuickBooks Connection Troubleshooting</h1>
    
    <div class="info">
        <h3>Current Configuration:</h3>
        <p><strong>Client ID:</strong> ABYzg2dYpmUlNblvzAAgHjWIcgfxHeGyHJxdrrCkKRYIkGgKPS</p>
        <p><strong>Redirect URI:</strong> https://ae7894b1-12cd-48fe-acc6-f6506c6cf73b-00-3b44ujv51cwut.janeway.replit.dev/api/quickbooks/callback</p>
    </div>

    <h3>Test Steps:</h3>
    
    <button onclick="testAuthEndpoint()">1. Test Auth Endpoint</button>
    <button onclick="testDirectConnection()">2. Test Direct QuickBooks Connection</button>
    <button onclick="checkAppStatus()">3. Check App Status</button>
    
    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = '<strong>' + new Date().toLocaleTimeString() + ':</strong> ' + message;
            results.appendChild(div);
        }

        async function testAuthEndpoint() {
            log('Testing auth endpoint...', 'info');
            try {
                const response = await fetch('/api/quickbooks/auth');
                const data = await response.json();
                log('Auth endpoint response: ' + JSON.stringify(data, null, 2), 'success');
                
                if (data.authUrl) {
                    log('Auth URL generated successfully', 'success');
                } else {
                    log('No auth URL in response', 'error');
                }
            } catch (error) {
                log('Auth endpoint error: ' + error.message, 'error');
            }
        }

        async function testDirectConnection() {
            log('Testing direct QuickBooks connection...', 'info');
            const authUrl = `https://appcenter.intuit.com/connect/oauth2?client_id=ABYzg2dYpmUlNblvzAAgHjWIcgfxHeGyHJxdrrCkKRYIkGgKPS&scope=com.intuit.quickbooks.accounting&redirect_uri=${encodeURIComponent('https://ae7894b1-12cd-48fe-acc6-f6506c6cf73b-00-3b44ujv51cwut.janeway.replit.dev/api/quickbooks/callback')}&response_type=code&access_type=offline&state=debug_test`;
            
            log('Opening QuickBooks auth URL in new window...', 'info');
            log('URL: ' + authUrl, 'info');
            
            const popup = window.open(authUrl, 'quickbooks_auth', 'width=600,height=700');
            
            if (popup) {
                log('Popup opened successfully - check for any error messages', 'success');
            } else {
                log('Popup blocked - please allow popups for this site', 'error');
            }
        }

        async function checkAppStatus() {
            log('Checking QuickBooks app status...', 'info');
            log('Please verify in QuickBooks Developer Console:', 'info');
            log('1. App is published/active', 'info');
            log('2. Redirect URIs match exactly', 'info');
            log('3. Client ID is correct', 'info');
            log('4. Scopes include "com.intuit.quickbooks.accounting"', 'info');
        }
    </script>
</body>
</html>
