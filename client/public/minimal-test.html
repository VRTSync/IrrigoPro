<!DOCTYPE html>
<html>
<head>
    <title>Minimal QuickBooks Test</title>
</head>
<body>
    <h2>Minimal Test</h2>
    <button onclick="testConnection()">Click to Test</button>
    <div id="result"></div>
    
    <script>
        console.log("Minimal test page loaded");
        
        function testConnection() {
            console.log("Testing connection...");
            document.getElementById('result').innerHTML = "Testing...";
            
            // Most basic XHR possible
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/quickbooks/auth');
            
            xhr.onreadystatechange = function() {
                console.log("State changed:", xhr.readyState, xhr.status);
                
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        console.log("SUCCESS! Response:", xhr.responseText);
                        var data = JSON.parse(xhr.responseText);
                        document.getElementById('result').innerHTML = 
                            "<h3>SUCCESS!</h3><p>Auth URL: " + data.authUrl.substring(0, 100) + "...</p>" +
                            "<button onclick=\"window.location.href='" + data.authUrl + "'\">Redirect to QuickBooks</button>";
                    } else {
                        console.log("ERROR! Status:", xhr.status, "Text:", xhr.responseText);
                        document.getElementById('result').innerHTML = 
                            "<h3>ERROR!</h3><p>Status: " + xhr.status + "</p><p>" + xhr.responseText + "</p>";
                    }
                }
            };
            
            xhr.onerror = function() {
                console.log("XHR Error occurred");
                document.getElementById('result').innerHTML = "<h3>XHR ERROR!</h3>";
            };
            
            xhr.send();
        }
    </script>
</body>
</html>
