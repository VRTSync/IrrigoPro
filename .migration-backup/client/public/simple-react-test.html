<!DOCTYPE html>
<html>
<head>
    <title>React Button Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        function QuickBooksButton() {
            const [isConnecting, setIsConnecting] = React.useState(false);
            
            console.log("🔵 React component rendering, isConnecting:", isConnecting);
            
            const handleClick = () => {
                console.log("🔵 React button clicked!");
                setIsConnecting(true);
                
                const xhr = new XMLHttpRequest();
                xhr.open('GET', '/api/quickbooks/auth');
                
                xhr.onreadystatechange = function() {
                    console.log("🔵 XHR State:", xhr.readyState, "Status:", xhr.status);
                    
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            const data = JSON.parse(xhr.responseText);
                            console.log("🟢 Success! Redirecting to:", data.authUrl);
                            window.location.href = data.authUrl;
                        } else {
                            console.error("🔴 Error:", xhr.status);
                            setIsConnecting(false);
                        }
                    }
                };
                
                xhr.onerror = function() {
                    console.error("🔴 Network error");
                    setIsConnecting(false);
                };
                
                xhr.send();
            };
            
            return React.createElement(
                'button',
                {
                    onClick: handleClick,
                    disabled: isConnecting,
                    style: {
                        padding: '10px 20px',
                        backgroundColor: isConnecting ? '#ccc' : '#0066cc',
                        color: 'white',
                        border: 'none',
                        borderRadius: '4px',
                        cursor: isConnecting ? 'not-allowed' : 'pointer'
                    }
                },
                isConnecting ? 'Connecting...' : 'Connect to QuickBooks'
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(QuickBooksButton));
    </script>
</body>
</html>
