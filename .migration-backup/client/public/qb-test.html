<!DOCTYPE html>
<html>
<head>
    <title>Direct QuickBooks Test</title>
</head>
<body>
    <h1>Direct QuickBooks Test</h1>
    <button onclick="testQuickBooks()">Test Connection</button>
    <div id="output"></div>

    <script>
        function testQuickBooks() {
            console.log("Testing QuickBooks connection directly...");
            const output = document.getElementById('output');
            output.innerHTML = "Testing...";
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/quickbooks/auth');
            
            xhr.onload = function() {
                console.log("XHR Success:", xhr.status, xhr.responseText);
                const data = JSON.parse(xhr.responseText);
                output.innerHTML = `
                    <h3>SUCCESS!</h3>
                    <p>Status: ${xhr.status}</p>
                    <p>Auth URL: ${data.authUrl}</p>
                    <p>State: ${data.state}</p>
                    <button onclick="window.location.href='${data.authUrl}'">Go to QuickBooks</button>
                `;
            };
            
            xhr.onerror = function() {
                console.error("XHR Error");
                output.innerHTML = "<h3>ERROR!</h3><p>Connection failed</p>";
            };
            
            xhr.send();
        }
    </script>
</body>
</html>
