kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"
# Task #555 — the deployed API has no express-session middleware wired up
# (the package is installed but app.ts never mounts it) and /api/auth/login
# never sets req.session.userId, so the session-based path in
# requireAuthentication can never satisfy a web request. Mobile clients
# carry a bearer token and are unaffected, but every web request from a
# logged-in irrigation_manager / company_admin / super_admin would 401 in
# production with this gate closed. Re-enable the legacy header-auth path
# (the web client already sends x-user-* headers + credentials: include)
# until the proper session-auth migration lands.
ALLOW_HEADER_AUTH = "1"

[services.production.health.startup]
path = "/api/healthz"
