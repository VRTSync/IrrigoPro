<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - IrrigoPro</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e3a8a; color: white; }
        .container { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #ea580c; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #065f46; }
        .error { background: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>IrrigoPro Login Test</h2>
        <form id="loginForm">
            <div>
                <label>Username:</label>
                <input type="text" id="username" value="randy@highplainsprop.com" required>
            </div>
            <div>
                <label>Password:</label>
                <input type="password" id="password" value="password123" required>
            </div>
            <button type="submit">Test Login</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Testing login with:', { username, password });
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const user = await response.json();
                    console.log('Login successful:', user);
                    
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Login Successful!</h3>
                        <p><strong>Name:</strong> ${user.name}</p>
                        <p><strong>Role:</strong> ${user.role}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Company ID:</strong> ${user.companyId || 'None (ready for setup)'}</p>
                    `;
                } else {
                    const error = await response.text();
                    console.error('Login failed:', error);
                    
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Login Failed</h3>
                        <p>Status: ${response.status}</p>
                        <p>Error: ${error}</p>
                    `;
                }
            } catch (error) {
                console.error('Network error:', error);
                
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Network Error</h3>
                    <p>${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
