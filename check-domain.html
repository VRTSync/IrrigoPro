<!DOCTYPE html>
<html>
<head>
    <title>Domain Check</title>
</head>
<body>
    <h1>Current Domain Information</h1>
    <p><strong>Domain:</strong> <span id="domain"></span></p>
    <p><strong>Full URL:</strong> <span id="fullUrl"></span></p>
    <p><strong>QuickBooks Redirect URI:</strong> <span id="redirectUri"></span></p>
    
    <script>
        const domain = window.location.hostname;
        const fullUrl = window.location.href;
        const redirectUri = window.location.protocol + '//' + window.location.host + '/api/quickbooks/callback';
        
        document.getElementById('domain').textContent = domain;
        document.getElementById('fullUrl').textContent = fullUrl;
        document.getElementById('redirectUri').textContent = redirectUri;
    </script>
</body>
</html>
