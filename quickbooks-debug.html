<!DOCTYPE html>
<html>
<head>
    <title>QuickBooks Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px 0; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>QuickBooks Connection Debug</h1>
    
    <button onclick="testAuthUrl()">Test Auth URL Generation</button>
    <button onclick="testDirectConnection()">Test Direct Connection</button>
    <button onclick="testWithDifferentDomain()">Test With Different Domain</button>
    
    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            document.getElementById('results').appendChild(div);
        }

        async function testAuthUrl() {
            log('Testing auth URL generation...');
            try {
                const response = await fetch('/api/quickbooks/auth');
                const data = await response.json();
                log(`Auth URL: ${data.authUrl}`, 'success');
                
                // Parse the URL
                const url = new URL(data.authUrl);
                const params = new URLSearchParams(url.search);
                log(`Client ID: ${params.get('client_id')}`);
                log(`Redirect URI: ${decodeURIComponent(params.get('redirect_uri'))}`);
                log(`Scope: ${params.get('scope')}`);
                
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function testDirectConnection() {
            log('Testing direct connection to QuickBooks...');
            try {
                const response = await fetch('/api/quickbooks/auth');
                const data = await response.json();
                
                if (data.authUrl) {
                    log('Attempting to connect to QuickBooks...', 'success');
                    // Open in new tab to see the error
                    const newWindow = window.open(data.authUrl, '_blank');
                    if (newWindow) {
                        log('Opened QuickBooks auth in new tab', 'success');
                    } else {
                        log('Popup blocked - check popup settings', 'error');
                    }
                }
            } catch (error) {
                log(`Connection test failed: ${error.message}`, 'error');
            }
        }

        async function testWithDifferentDomain() {
            log('Testing with different redirect URI formats...');
            
            const testUris = [
                `${window.location.protocol}//${window.location.host}/api/quickbooks/callback`,
                `https://${window.location.host}/api/quickbooks/callback`,
                `http://${window.location.host}/api/quickbooks/callback`
            ];
            
            testUris.forEach(uri => {
                log(`Testing URI: ${uri}`);
            });
        }

        // Auto-run initial test
        window.onload = function() {
            log('QuickBooks Debug Tool Loaded');
            log(`Current domain: ${window.location.host}`);
            log(`Current protocol: ${window.location.protocol}`);
        };
    </script>
</body>
</html>
