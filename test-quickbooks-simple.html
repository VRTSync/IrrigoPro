<!DOCTYPE html>
<html>
<head>
    <title>Simple QuickBooks Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .success { background: green; color: white; }
        .error { background: red; color: white; }
    </style>
</head>
<body>
    <h1>QuickBooks Integration Test</h1>
    <p>This bypasses all React components and uses the exact same approach as the working minimal test.</p>
    
    <button onclick="connectToQuickBooks()">Connect to QuickBooks (Same as React should do)</button>
    <div id="status"></div>
    
    <script>
        function connectToQuickBooks() {
            console.log("🔵 Starting QuickBooks connection...");
            document.getElementById('status').innerHTML = "Connecting...";
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/quickbooks/auth');
            
            xhr.onreadystatechange = function() {
                console.log("🔵 State:", xhr.readyState, "Status:", xhr.status);
                
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);
                        console.log("🟢 Success! Redirecting to:", data.authUrl);
                        document.getElementById('status').innerHTML = "Success! Redirecting...";
                        document.getElementById('status').className = "success";
                        
                        // Same redirect as React component should do
                        window.location.href = data.authUrl;
                    } else {
                        console.error("🔴 Error:", xhr.status, xhr.responseText);
                        document.getElementById('status').innerHTML = "Error: " + xhr.status;
                        document.getElementById('status').className = "error";
                    }
                }
            };
            
            xhr.onerror = function() {
                console.error("🔴 Network error");
                document.getElementById('status').innerHTML = "Network error";
                document.getElementById('status').className = "error";
            };
            
            xhr.send();
        }
    </script>
</body>
</html>
